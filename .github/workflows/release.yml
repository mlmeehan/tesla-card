name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & attach bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Release-time leg of the version-sync invariant (Story 7.4 / NFR-5). The
      # per-push `version-sync` lint gate already proves package.json `version` ===
      # src/const.ts `CARD_VERSION`; the git TAG is only knowable here, so this asserts
      # the published tag equals `v${version}` (and therefore `v${CARD_VERSION}`). A tag
      # can never ship a bundle whose banner version disagrees with it.
      #
      # SINGLE SOURCE OF TRUTH: this runs the same `version-sync` gate in its
      # `--release-tag` sub-mode, whose logic is unit-tested in src/version-sync.test.ts
      # (the tag leg is no longer an untested inline-shell reimplementation that could
      # silently drift). Security: the tag is passed via `env:`, never interpolated as
      # `${{ }}` into the shell — prevents tag-name script injection.
      - name: Assert release tag matches the synced version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/lint/version-sync.mjs --release-tag "$RELEASE_TAG"

      - run: npm run build

      # Attach the single built bundle to the GitHub Release. The bundle's version
      # banner comes from CARD_VERSION (NOT stamped from the tag) — the assertion
      # above guarantees the tag already agrees with it, so no stamping is needed.
      - name: Attach tesla-card.js to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tesla-card.js
