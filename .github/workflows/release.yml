name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & attach bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Stamp the release tag into the bundle version banner (optional, best-effort).
      - name: Attach tesla-card.js to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tesla-card.js
