name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & attach bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Release-time leg of the version-sync invariant (Story 7.4 / NFR-5). The
      # per-push `version-sync` lint gate already proves package.json `version` ===
      # src/const.ts `CARD_VERSION`; the git TAG is only knowable here, so this step
      # asserts the published tag equals `v${version}` (and therefore `v${CARD_VERSION}`,
      # which the lint gate guarantees equals `version`). A tag can never ship a bundle
      # whose banner version disagrees with it.
      #
      # Security: the tag is passed through `env:` and never interpolated as `${{ }}`
      # directly into the shell — prevents tag-name script injection (same guard the
      # burn-in job in test.yml documents).
      - name: Assert release tag matches the synced version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          CARD_VERSION="$(node -e "console.log((require('fs').readFileSync('src/const.ts','utf8').match(/export const CARD_VERSION = '([^']+)'/)||[])[1] || '')")"
          echo "tag=${RELEASE_TAG}  package.json=${PKG_VERSION}  CARD_VERSION=${CARD_VERSION}"
          if [ -z "$CARD_VERSION" ]; then
            echo "FAIL release: could not parse CARD_VERSION from src/const.ts"; exit 1
          fi
          if [ "$PKG_VERSION" != "$CARD_VERSION" ]; then
            echo "FAIL release: package.json version ($PKG_VERSION) != CARD_VERSION ($CARD_VERSION) — the lint gate should have caught this"; exit 1
          fi
          if [ "$RELEASE_TAG" != "v${PKG_VERSION}" ]; then
            echo "FAIL release: tag '$RELEASE_TAG' != 'v${PKG_VERSION}' — the published tag must equal v\${version}/v\${CARD_VERSION} (NFR-5)"; exit 1
          fi
          echo "ok release: tag, package.json version, and CARD_VERSION all agree on '${PKG_VERSION}'"

      - run: npm run build

      # Attach the single built bundle to the GitHub Release. The bundle's version
      # banner comes from CARD_VERSION (NOT stamped from the tag) — the assertion
      # above guarantees the tag already agrees with it, so no stamping is needed.
      - name: Attach tesla-card.js to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tesla-card.js
