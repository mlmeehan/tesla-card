name: Validate

# HACS packaging validation + bundle build gate. End-to-end tests (Playwright) and
# burn-in live in test.yml so E2E runs once per push/PR — see .github/workflows/test.yml.

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin

  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify bundle was produced
        run: test -s dist/tesla-card.js

  # Structural + policy CI gates: the data-access boundary lint suite
  # (no-bare-hass.states + no-cycle, Story 1.7), the trade-dress denylist
  # (Story 2.6 — fails on Tesla brand red / option codes / wordmark ®™ / logo
  # asset filenames), the import-allowlist gate (Story 2.7 — runtime imports
  # ⊆ {lit, @mdi/js}; @mdi/js named-path only, never the barrel — NFR-2), the
  # no-network-egress gate (Story 2.8 — fails on any direct browser network
  # primitive (fetch / XMLHttpRequest / WebSocket / EventSource / RTCPeerConnection
  # / navigator.sendBeacon) in the bundled src/ graph; hass.callService/states ride
  # HA's own connection — AR-17 privacy affirmation, no telemetry), and the
  # version-sync gate (Story 7.4 — fails on package.json `version` ↔ src/const.ts
  # `CARD_VERSION` drift and pins hacs.json `filename` ↔ rollup output basename =
  # tesla-card.js; the git TAG leg is checked at release time in release.yml — NFR-5 / AC1),
  # and the no-planning-artifacts gate (keeps BMAD/planning artifacts — PRD, epics,
  # stories, sprint status, retros, brainstorming, research, trace matrices — OUT of
  # this public-bound repo; they live in the private sibling tesla-card-planning. Same
  # denylist the native pre-commit hook + Claude Bash guard use).
  # Merge-blocking, same tier as type-check/build. Dep-light scripts
  # (scripts/lint/*.mjs); no ESLint, no new deps.
  lint:
    name: Structural gates (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
