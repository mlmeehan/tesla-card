<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Empty-data favicon: suppress the browser's automatic /favicon.ico request so
         a clean Scene logs ZERO console errors (the NFR-1 profiler precondition). -->
    <link rel="icon" href="data:," />
    <title>Tesla Card — demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 800px at 70% -10%, #16202c, #0b1118 60%, #070b10);
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        color: #e6edf5;
        padding: 28px 16px 80px;
        box-sizing: border-box;
      }
      .bar {
        max-width: 520px;
        margin: 0 auto 22px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .bar h1 {
        font-size: 15px;
        font-weight: 700;
        margin: 0 auto 0 0;
        letter-spacing: 0.01em;
      }
      .bar button {
        font: inherit;
        font-size: 13px;
        font-weight: 650;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: #e6edf5;
        cursor: pointer;
      }
      .bar button.active {
        background: #38bdf8;
        border-color: #38bdf8;
        color: #06121e;
      }
      .bar .sep {
        width: 1px;
        align-self: stretch;
        background: rgba(255, 255, 255, 0.16);
        margin: 2px 4px;
      }
      #stage {
        max-width: 520px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1>Tesla Card · live demo</h1>
      <button id="b-awake" class="active">Awake / Charging</button>
      <button id="b-plugged" title="Plugged but not drawing — blue charge-port glow + cable, no halo">Plugged-idle</button>
      <button id="b-parked" title="Not plugged — neutral, no charge cue">Parked</button>
      <button id="b-apertures" title="Frunk + liftgate + door + window open — neutral-silver crossfading overlays">
        Apertures
      </button>
      <button id="b-asleep">Asleep</button>
      <button id="b-unresolved" title="Foreign / unconfigured install — no Tesla entities resolve (designed empty state)">
        Unresolved
      </button>
      <span class="sep"></span>
      <button id="b-body-charge" title="Body-layers render + charging — green charge-port glow over the body (Story 3.6; needs demo/local art)">
        Body · charging
      </button>
      <button id="b-body-broken" title="Non-conforming body (mask dropped) — must fall through to the bundled EV (Story 3.6 AC3)">
        Body · broken
      </button>
      <span class="sep"></span>
      <button id="b-default" class="active" title="Device named “Garage Model Y”, garage_model_y_* entities">
        garage_model_y_*
      </button>
      <button id="b-renamed" title="Device named “My Tesla”, my_tesla_* entities — proves name-based resolution">
        my_tesla_*
      </button>
    </div>
    <div id="stage"></div>

    <script type="module">
      import '../dist/tesla-card.js';
      // Shared fixture corpus (Story 1.1, F5): ONE environment-agnostic JSON feeds
      // BOTH Vitest (node) and this browser demo — no second copy. Under `npm run
      // dev` (Vite) the import is transformed; under plain http-server (Playwright)
      // the browser's native JSON module handles `with { type: 'json' }`.
      import awakeFixture from '../src/fixtures/model-y-awake.json' with { type: 'json' };

      const s = (state, attributes = {}) => ({ state, attributes });

      function awakeStates() {
        // Promote the shared corpus to this demo's mutable state map. structuredClone
        // so asleepStates()'s muters and the colour-entity inject below never scribble
        // on the imported module object. The fixture carries the full HA state shape
        // (entity_id/last_changed/last_updated). Since Story 3.3 the Hero consumes
        // data/freshness for the honest "updated Nm ago" hint, so those stamps are
        // now load-bearing: referenceNow() = MAX stamp across states (here the
        // fixture instant), and the battery_level stamp drives the hint. Awake
        // leaves the fixture stamps intact → fresh → "Just now".
        const st = structuredClone(awakeFixture.states);
        // Synthetic exterior-colour helper for entity-driven paint (?colorentity=…).
        // Demo-only: the official tesla_fleet exposes no such attribute, so it is
        // intentionally absent from the captured fixture.
        st['sensor.tesla_exterior_color'] = s(colorEntity || 'unknown');
        return st;
      }

      function asleepStates() {
        const st = awakeStates();
        st['binary_sensor.garage_model_y_status'] = s('off');
        // Back-date the battery stamp ~47m before the fixture reference instant
        // (the max stamp across the still-fresh fixture entities) so the Hero
        // shows "Asleep · updated 47m ago" (AC4). Even though the value reads
        // `unavailable` while asleep, last_updated still says WHEN it last
        // reported — exactly the honest hint we surface.
        const staleStamp = new Date(Date.parse(awakeFixture.states['sensor.garage_model_y_battery_level'].last_updated) - 47 * 60_000).toISOString();
        st['sensor.garage_model_y_battery_level'] = { ...s('unavailable'), last_updated: staleStamp, last_changed: staleStamp };
        st['sensor.garage_model_y_battery_range'] = s('unavailable');
        // The cached sensors survive sleep (they back the compact in-line embed's
        // last-known SoC/range — Story 8.11), but they stopped updating when the car
        // slept too: keep their values, back-date their stamps to match, so the
        // compact embed reads "Asleep · updated 47m ago", not a fresh "Just now".
        st['sensor.usable_battery_level'] = { ...st['sensor.usable_battery_level'], last_updated: staleStamp, last_changed: staleStamp };
        st['sensor.estimate_battery_range'] = { ...st['sensor.estimate_battery_range'], last_updated: staleStamp, last_changed: staleStamp };
        st['climate.garage_model_y_climate'] = s('off', { min_temp: 15, max_temp: 28, target_temp_step: 0.5 });
        st['sensor.garage_model_y_charging'] = s('unavailable');
        st['switch.garage_model_y_charge'] = s('unavailable');
        // Charging telemetry also drops out when the car sleeps.
        st['sensor.garage_model_y_charger_power'] = s('unavailable');
        st['sensor.garage_model_y_charge_rate'] = s('unavailable');
        st['sensor.garage_model_y_charge_energy_added'] = s('unavailable');
        st['sensor.garage_model_y_time_to_full_charge'] = s('unavailable');
        st['sensor.garage_model_y_charger_voltage'] = s('unavailable');
        st['cover.garage_model_y_charge_port_door'] = s('unavailable');
        st['media_player.garage_model_y_media_player'] = s('off');
        return st;
      }

      // Story 3.4 — the two charge states the awake fixture (which is Charging)
      // doesn't cover, so a human can sweep nothing → blue → green. Mute the
      // relevant entities off the cloned awake corpus; leave the battery stamp
      // fresh (these are awake states → "Just now").
      function parkedStates() {
        const st = awakeStates();
        st['sensor.garage_model_y_charging'] = s('Disconnected');
        st['binary_sensor.garage_model_y_charge_cable'] = s('off');
        st['cover.garage_model_y_charge_port_door'] = s('closed');
        st['sensor.garage_model_y_charger_power'] = s('0');
        st['sensor.garage_model_y_time_to_full_charge'] = s('0');
        return st;
      }

      function pluggedStates() {
        const st = awakeStates();
        st['sensor.garage_model_y_charging'] = s('Complete'); // plugged, not drawing
        st['binary_sensor.garage_model_y_charge_cable'] = s('on');
        st['cover.garage_model_y_charge_port_door'] = s('open');
        st['sensor.garage_model_y_charger_power'] = s('0');
        return st;
      }

      // Story 3.5 — an apertures scenario so the four open-state overlays are
      // visually verifiable (frunk + liftgate + door + window). Clone the awake
      // corpus and open the aperture entities; awake → fresh stamps → "Just now".
      // Per-aperture URL flags (?frunk=1&door=1 …) open ONLY those (independence
      // check); ?unavail=<name> forces one aperture `unavailable` (graceful-degrade
      // check — its overlay must stay hidden, never a false "open"). HTML-only.
      function aperturesStates() {
        const st = awakeStates();
        const want = apAny
          ? apFlags
          : { frunk: true, liftgate: true, door: true, window: true };
        st['cover.garage_model_y_frunk'] = s(want.frunk ? 'open' : 'closed');
        st['cover.garage_model_y_trunk'] = s(want.liftgate ? 'open' : 'closed'); // rear hatch = liftgate
        // The front-driver door drives the single "a door is open" indication.
        st['binary_sensor.garage_model_y_front_driver_door'] = s(want.door ? 'on' : 'off');
        st['cover.garage_model_y_windows'] = s(want.window ? 'open' : 'closed');
        // Graceful-degrade probe: force one aperture entity `unavailable`.
        const unavailMap = {
          frunk: 'cover.garage_model_y_frunk',
          liftgate: 'cover.garage_model_y_trunk',
          door: 'binary_sensor.garage_model_y_front_driver_door',
          window: 'cover.garage_model_y_windows',
        };
        if (apUnavail && unavailMap[apUnavail]) st[unavailMap[apUnavail]] = s('unavailable');
        return st;
      }

      function unresolvedStates() {
        // Foreign / unconfigured install (Story 1.6 designed-empty-state): a few
        // unrelated, non-Tesla entities and NO Tesla registry. Nothing Tesla
        // resolves, so every vehicle read is neutral and the card renders a calm,
        // uninstalled empty state — never a crash, blank, or false reading. The
        // committed analogue is src/fixtures/all-unresolved.json.
        return {
          'light.living_room': s('on', { brightness: 180, friendly_name: 'Living Room' }),
          'light.kitchen': s('off', { friendly_name: 'Kitchen' }),
          'switch.coffee_maker': s('off', { friendly_name: 'Coffee Maker' }),
          'sensor.living_room_temperature': s('21.4', { unit_of_measurement: '°C', friendly_name: 'Living Room Temperature' }),
          'binary_sensor.front_door': s('off', { device_class: 'door', friendly_name: 'Front Door' }),
          'weather.home': s('partlycloudy', { temperature: 18, friendly_name: 'Home' }),
        };
      }

      // Two installs, same vehicle: the bundled "garage_model_y_*" prefix vs a
      // differently-named device "my_tesla_*". The card ships configured only
      // with name:"Model Y" — switching env proves it resolves entities by
      // function-name against whatever the device is actually called.
      const ENVIRONMENTS = {
        default: { prefix: 'garage_model_y', deviceName: 'Garage Model Y', platform: 'teslemetry' },
        renamed: { prefix: 'my_tesla', deviceName: 'My Tesla', platform: 'tesla_fleet' },
        // ?env=tesla_custom — the COSTLY distinct dialect (Story 5.11 AC4). Same
        // vehicle, registry platform 'tesla_custom' so detectDialect probes it and
        // the dialect seam is exercised end-to-end. Story 15.1: the deviceName must
        // slug to the entity prefix ('garage_model_y') — the old parenthetical name
        // slugged to 'garage_model_y_tesla_custom', sending every 14.1 alias guess
        // to a dead id, so no divergent key could ever resolve under this env. The
        // charging shape is derived per-scenario in toTeslaCustomShape() below.
        tesla_custom: { prefix: 'garage_model_y', deviceName: 'Garage Model Y', platform: 'tesla_custom' },
      };

      // Story 15.1 — env=tesla_custom carries the REAL 14.1 entity shape for the
      // charge-classification chain: the integration exposes NO charging-status
      // string (research §5) — only the boolean binary_sensor.charging, the plug
      // binary_sensor.charger, and binary_sensor.online for the status boolean.
      // DERIVE all three from the scenario's fleet entities BEFORE dropping them
      // (never hardcode: the scenario builders mutate the fleet string per-scenario
      // — asleep→'unavailable', parked→'Disconnected', plugged→'Complete' — and
      // ?charge= reuses the same builders; a hardcoded 'on' would render
      // ?scenario=parked&env=tesla_custom as a charging car):
      //   boolean charging = 'on' iff raw === 'Charging'; 'unavailable' iff raw is
      //                      dead (unavailable/unknown/absent); else 'off'
      //   plug charger     = 'unavailable' iff raw is dead (unavailable/unknown/
      //                      absent); 'off' iff raw === 'Disconnected'; else 'on'
      //   online           = the fleet status boolean, renamed (the resolver's
      //                      tesla_custom alias is binary_sensor.online; without it
      //                      isAsleep() falls to the aliased-away battery and reads
      //                      the whole env as ASLEEP — charge visuals suppressed)
      // buildRegistry derives the registry FROM the states object, so the dialect
      // probe follows these edits automatically.
      function toTeslaCustomShape(st, prefix) {
        const out = { ...st };
        const raw = out[`sensor.${prefix}_charging`]?.state;
        const dead = raw === undefined || raw === 'unavailable' || raw === 'unknown';
        out[`binary_sensor.${prefix}_charging`] = s(dead ? 'unavailable' : raw === 'Charging' ? 'on' : 'off');
        out[`binary_sensor.${prefix}_charger`] = s(dead ? 'unavailable' : raw === 'Disconnected' ? 'off' : 'on');
        const online = out[`binary_sensor.${prefix}_status`];
        if (online) out[`binary_sensor.${prefix}_online`] = online;
        // No status STRING / fleet-spelled cable / fleet-spelled status on this dialect.
        delete out[`sensor.${prefix}_charging`];
        delete out[`binary_sensor.${prefix}_charge_cable`];
        delete out[`binary_sensor.${prefix}_status`];
        return out;
      }

      function reprefix(src, prefix) {
        if (prefix === 'garage_model_y') return src;
        const out = {};
        for (const [id, val] of Object.entries(src)) {
          const dot = id.indexOf('.');
          const domain = id.slice(0, dot);
          let obj = id.slice(dot + 1);
          if (obj.startsWith('garage_model_y_')) {
            obj = prefix + '_' + obj.slice('garage_model_y_'.length);
          }
          out[domain + '.' + obj] = val;
        }
        return out;
      }

      // Mock the HA entity/device registry (hass.entities + hass.devices) so the
      // resolver has the same signals it has in a real install.
      function buildRegistry(st, env) {
        const deviceId = 'tesla_vehicle';
        const entities = {};
        for (const id of Object.keys(st)) {
          entities[id] = {
            entity_id: id,
            device_id: deviceId,
            platform: env.platform,
            has_entity_name: true,
            area_id: null,
          };
        }
        const devices = {
          [deviceId]: {
            id: deviceId,
            name: env.deviceName,
            name_by_user: null,
            manufacturer: 'Tesla',
            model: 'Model Y',
          },
        };
        return { entities, devices };
      }

      const params = new URLSearchParams(location.search);
      // ?charge=charging|plugged|parked — pick the charge state for the body-charge
      // demo (Story 3.6) without a scenario button; reuses the existing scenario
      // state builders. 'charging' is the awake default (no flag needed).
      const chargeParam = params.get('charge');
      let asleep = params.get('scenario') === 'asleep';
      let parked = params.get('scenario') === 'parked' || chargeParam === 'parked';
      let plugged = params.get('scenario') === 'plugged' || chargeParam === 'plugged';
      let apertures = params.get('scenario') === 'apertures';
      let unresolved = params.get('scenario') === 'unresolved';
      // Per-aperture flags (Story 3.5 independence/degrade harness). When any is
      // set, only those apertures open; otherwise the scenario opens all four.
      const apFlags = {
        frunk: params.get('frunk') === '1',
        liftgate: params.get('liftgate') === '1',
        door: params.get('door') === '1',
        window: params.get('window') === '1',
      };
      const apAny = apFlags.frunk || apFlags.liftgate || apFlags.door || apFlags.window;
      const apUnavail = params.get('unavail'); // ?unavail=frunk|liftgate|door|window
      let envKey = ENVIRONMENTS[params.get('env')] ? params.get('env') : 'default';
      const startPanel = params.get('panel') || 'charging';
      // ?colorentity=blue (or a #hex, or a generic preset name) drives paint from an entity.
      const colorEntity = params.get('colorentity');

      let states = {};
      let registry = { entities: {}, devices: {} };
      function rebuild() {
        if (unresolved) {
          // No Tesla entities, no registry → resolution falls back to bundled
          // defaults, which are absent from these states (the empty-state path).
          states = unresolvedStates();
          registry = { entities: {}, devices: {} };
          return;
        }
        const env = ENVIRONMENTS[envKey];
        const base = asleep
          ? asleepStates()
          : parked
            ? parkedStates()
            : plugged
              ? pluggedStates()
              : apertures
                ? aperturesStates()
                : awakeStates();
        states = reprefix(base, env.prefix);
        // Story 15.1 — the tesla_custom env carries the dialect's REAL charging
        // shape (boolean + plug + online, fleet string dropped); see the
        // toTeslaCustomShape derivation rules above. Must run BEFORE
        // buildRegistry so the registry (and the dialect probe) follow.
        if (envKey === 'tesla_custom') states = toTeslaCustomShape(states, env.prefix);
        registry = buildRegistry(states, env);
        // Composed-Scene profiler path (?card=my-home): the Scene's tc-solar renders
        // the Story 6.4 weather vignette from HA-core weather.home (+ sun.sun for
        // day/night). The captured vehicle fixture carries neither — they're
        // install-wide core entities, not Tesla-prefixed — so without this the
        // vignette is honestly OMITTED (weather-vignette.ts: absent ⇒ `nothing`) and
        // the profiler subject is missing its third animated layer. Inject a daytime
        // partlycloudy sky so the vignette animates (sun glow/rays + drifting cloud),
        // matching the documented AC3 subject (6 cards + bus + vignette).
        if (new URLSearchParams(location.search).get('card') === 'my-home') {
          states['weather.home'] = s('partlycloudy', { temperature: 18, friendly_name: 'Home' });
          states['sun.sun'] = s('above_horizon');
        }
      }
      rebuild();

      // Hero render modes:
      //   default          → bundled generic-EV silhouette (recolours via ?paint=)
      //   ?image=1         → a custom flat <img> (the legacy ./car.svg fallback)
      //   ?recolor=1 / ?colorentity=… → photoreal recolor stack from ./local/
      //                       (gitignored, bring-your-own art). Combine with the
      //                       scenario / ?charge= flags for the body-charge overlay.
      //   ?recolor=broken  → a NON-CONFORMING body (mask dropped, Story 3.6 AC3):
      //                       carView must fall THROUGH to the bundled EV, never a
      //                       broken <image>. Needs no art (the body never renders).
      const recolorBroken = params.get('recolor') === 'broken';
      const recolor = params.get('recolor') === '1' || !!colorEntity || recolorBroken;
      const wantImage = params.get('image') === '1';
      const paint = params.get('paint');

      const card = document.createElement('tesla-card');
      const cardConfig = {
        type: 'custom:tesla-card',
        name: 'Model Y',
        default_panel: startPanel,
      };
      if (recolor) {
        // colorentity → PaintSource (read live from an entity, mapped via the
        // built-in generic colour presets); otherwise a literal colour string.
        cardConfig.paint = colorEntity
          ? { entity: 'sensor.tesla_exterior_color', default: '#9aa3ad' }
          : paint || '#23519e';
        cardConfig.body = recolorBroken
          ? // mask + highlight dropped → isConformingBody() rejects it → fall-through.
            { color: './local/color.webp', shade: './local/shade.webp' }
          : {
              color: './local/color.webp',
              shade: './local/shade.webp',
              highlight: './local/highlight.webp',
              mask: './local/paintmask.png',
            };
      } else if (wantImage) {
        cardConfig.image = './car.svg';
      } else if (paint) {
        // generic-EV default, tinted live (no per-colour assets needed)
        cardConfig.paint = paint;
      }
      card.setConfig(cardConfig);
      document.getElementById('stage').appendChild(card);

      // Composed-Scene profiler harness (NFR-1 / Story 6.8 AC3). `?card=my-home`
      // mounts the full `tc-my-home` Scene — six live cards + Gateway bus + weather
      // vignette — fed the SAME mock hass (which already carries the energy site +
      // weather), so the resting Scene animates at steady state for a ~10s profiler
      // capture. The standalone vehicle card is hidden so the Scene is the sole
      // subject, and the stage widens to the desktop horizontal-bus layout (not the
      // ≤540px vertical reflow). See docs/profiler-checklist-nfr1.md.
      // Editor harness mode (?editor=1). Mounts the REAL lazy-loaded config editor
      // (tesla-card-editor, reached exactly as Lovelace does — `getConfigElement`)
      // fed the SAME mock hass as the card, so the Story 9.9 guided-setup wizard is
      // drivable in a real browser. The jsdom suite (editor.test.ts) proves the
      // wizard's logic but cannot verify computed layout (≥44px targets), real
      // `prefers-reduced-motion`, or keyboard focus order — that is this mode's job.
      // `&setup=` picks the starting config state:
      //   bare (default) → { type }                         → wizard at Detect
      //   progress       → { type, setup_complete:false }    → wizard resumes at Confirm
      //   done           → { name, setup_complete:true }     → normal form (Run-guided-setup re-entry)
      // Discovery honesty rides the card's own resolvers, so the discovery scenario
      // is the usual ?scenario= flag: default (awake) → vehicle online; ?scenario=unresolved
      // → nothing found (the empty/manual-fallback path).
      const wantEditor = params.get('editor') === '1';
      let editor = null;
      if (wantEditor) {
        card.style.display = 'none';
        const setupMode = params.get('setup') || 'bare';
        // Story 10.1 — `&editortype=my-home` opens the editor on a `custom:tc-my-home`
        // (Scene) config so the Scene-aware variant (Compose wizard step, live composed
        // preview, "Embedded vehicle cell" Tune group) is drivable in a real browser.
        // Default (or `vehicle`) keeps the vehicle card editor.
        const editorType = params.get('editortype') === 'my-home' ? 'custom:tc-my-home' : 'custom:tesla-card';
        const editorConfig =
          setupMode === 'done'
            ? { type: editorType, name: 'Garage Y', setup_complete: true }
            : setupMode === 'progress'
              ? { type: editorType, setup_complete: false }
              : { type: editorType };
        await customElements.whenDefined('tesla-card');
        editor = await customElements.get('tesla-card').getConfigElement();
        editor.id = 'editor';
        editor.setConfig(editorConfig);
        // The editor's ONLY output is the Lovelace `config-changed` event — surface
        // its last payload for assertions (this is the config the wizard would write).
        editor.addEventListener('config-changed', (e) => {
          window.__lastConfig = (e.detail && e.detail.config) || null;
        });
        document.getElementById('stage').appendChild(editor);
      }

      const wantMyHome = params.get('card') === 'my-home';
      let scene = null;
      if (wantMyHome) {
        card.style.display = 'none';
        const stage = document.getElementById('stage');
        stage.style.maxWidth = '1120px';
        scene = document.createElement('tc-my-home');
        scene.setConfig({ type: 'tc-my-home' });
        stage.appendChild(scene);
      }

      function push() {
        const hass = {
          states,
          entities: registry.entities,
          devices: registry.devices,
          locale: { language: 'en' },
          config: { unit_system: { temperature: '°C' } },
          callService,
        };
        card.hass = hass;
        if (scene) scene.hass = hass;
        if (editor) editor.hass = hass;
      }

      // optimistic service handler so the demo is interactive
      function callService(domain, service, data = {}) {
        const id = data.entity_id;
        const cur = states[id];
        const set = (state, attrs) =>
          (states[id] = { state, attributes: { ...(cur?.attributes ?? {}), ...(attrs ?? {}) } });
        if (id && cur) {
          if (service === 'lock') set('locked');
          else if (service === 'unlock') set('unlocked');
          else if (service === 'open_cover') set('open');
          else if (service === 'close_cover') set('closed');
          else if (service === 'turn_on') set('on');
          else if (service === 'turn_off') set('off');
          else if (service === 'toggle')
            set(['on', 'open', 'locked', 'heat_cool', 'playing'].includes(cur.state) ? 'off' : 'on');
          else if (service === 'set_value') set(String(data.value));
          else if (service === 'select_option') set(data.option);
          else if (service === 'set_temperature') set(cur.state, { temperature: data.temperature });
          else if (service === 'volume_set') set(cur.state, { volume_level: data.volume_level });
          else if (service === 'volume_mute') set(cur.state, { is_volume_muted: data.is_volume_muted });
          else if (service === 'media_play_pause') set(cur.state === 'playing' ? 'paused' : 'playing');
        }
        console.log('callService', domain, service, data);
        push();
        return Promise.resolve();
      }

      const bAwake = document.getElementById('b-awake');
      const bPlugged = document.getElementById('b-plugged');
      const bParked = document.getElementById('b-parked');
      const bApertures = document.getElementById('b-apertures');
      const bAsleep = document.getElementById('b-asleep');
      const bUnresolved = document.getElementById('b-unresolved');
      const bDefault = document.getElementById('b-default');
      const bRenamed = document.getElementById('b-renamed');

      function syncButtons() {
        bAwake.classList.toggle('active', !asleep && !unresolved && !parked && !plugged && !apertures);
        bPlugged.classList.toggle('active', plugged);
        bParked.classList.toggle('active', parked);
        bApertures.classList.toggle('active', apertures);
        bAsleep.classList.toggle('active', asleep);
        bUnresolved.classList.toggle('active', unresolved);
        bDefault.classList.toggle('active', envKey === 'default');
        bRenamed.classList.toggle('active', envKey === 'renamed');
      }

      function apply() {
        rebuild();
        push();
        syncButtons();
      }

      // Scenario buttons are mutually exclusive — selecting one clears the rest.
      function setScenario({ a = false, pa = false, pl = false, ap = false, u = false }) {
        asleep = a;
        parked = pa;
        plugged = pl;
        apertures = ap;
        unresolved = u;
        apply();
      }
      bAwake.addEventListener('click', () => setScenario({}));
      bPlugged.addEventListener('click', () => setScenario({ pl: true }));
      bParked.addEventListener('click', () => setScenario({ pa: true }));
      bApertures.addEventListener('click', () => setScenario({ ap: true }));
      bAsleep.addEventListener('click', () => setScenario({ a: true }));
      bUnresolved.addEventListener('click', () => setScenario({ u: true }));
      bDefault.addEventListener('click', () => {
        envKey = 'default';
        apply();
      });
      bRenamed.addEventListener('click', () => {
        envKey = 'renamed';
        apply();
      });

      // Body-render demos (Story 3.6). The body/recolor mode is URL-driven (the
      // card config is built once at load), so these navigate rather than re-push.
      document.getElementById('b-body-charge').addEventListener('click', () => {
        location.search = '?recolor=1&charge=charging';
      });
      document.getElementById('b-body-broken').addEventListener('click', () => {
        location.search = '?recolor=broken';
      });

      syncButtons();
      push();
    </script>
  </body>
</html>
